plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.aiapp'
    compileSdk 35

    defaultConfig {
        applicationId "com.example.aiapp"
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    implementation "com.squareup.okhttp3:okhttp:4.12.0"
}
